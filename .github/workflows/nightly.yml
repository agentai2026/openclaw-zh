# 定时发布：检测上游 → 汉化构建 → npm + Docker
name: 定时发布

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游变更检测）'
        required: false
        default: false
        type: boolean

concurrency:
  group: openclaw-zh-release
  cancel-in-progress: false

env:
  # 让 checkout 等 JS Action 使用 Node 24，消除弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_PACKAGE: '@agentai2026/openclaw-zh'
  DOCKER_IMAGE: agentai2027/openclaw-zh
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: '22'

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
    steps:
      - uses: actions/checkout@v5

      - name: 检测上游是否有变更
        id: check
        env:
          FORCE: ${{ github.event.inputs.force_build }}
        run: |
          UPSTREAM_VERSION=$(curl -fsSL https://registry.npmjs.org/openclaw/latest | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).version))")
          UPSTREAM_SHA=$(curl -fsSL "https://api.github.com/repos/${UPSTREAM_REPO}/commits/main" | node -e "let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).sha.slice(0,7)))")
          echo "upstream_version=$UPSTREAM_VERSION" >> $GITHUB_OUTPUT
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT

          LAST_SHA=""
          LAST_VER=""
          if [ -f .github/last-build.json ]; then
            LAST_SHA=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.github/last-build.json','utf8')).upstream_sha||'')")
            LAST_VER=$(node -e "console.log(JSON.parse(require('fs').readFileSync('.github/last-build.json','utf8')).upstream_version||'')")
          fi

          if [ "$FORCE" = "true" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$UPSTREAM_SHA" = "$LAST_SHA" ] && [ "$UPSTREAM_VERSION" = "$LAST_VER" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 克隆上游并应用汉化
        env:
          OPENCLAW_TARGET: openclaw
          OVERLAY_ROOT: ${{ github.workspace }}
        run: |
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw
          node scripts/apply-package-zh.js
          node scripts/apply-i18n.js
          OPENCLAW_TARGET=openclaw UPSTREAM_VERSION=${{ needs.check-upstream.outputs.upstream_version }} \
            GITHUB_RUN_NUMBER=${{ github.run_number }} node scripts/bump-openclaw-version.js

      - name: 安装依赖并构建
        working-directory: openclaw
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -e
          corepack enable
          pnpm install --no-frozen-lockfile --reporter=append-only
          pnpm canvas:a2ui:bundle || true
          node scripts/tsdown-build.mjs
          node scripts/runtime-postbuild.mjs
          node scripts/build-stamp.mjs || true
          pnpm build:plugin-sdk:dts || echo "⚠️ plugin-sdk dts 跳过（上游 TS 问题不影响运行）"
          node --import tsx scripts/write-plugin-sdk-entry-dts.ts || true
          node --import tsx scripts/canvas-a2ui-copy.ts || true
          node --import tsx scripts/copy-hook-metadata.ts || true
          node --import tsx scripts/copy-export-html-templates.ts || true
          node --import tsx scripts/write-build-info.ts || true
          node --import tsx scripts/write-cli-startup-metadata.ts || true
          node --import tsx scripts/write-cli-compat.ts || true
          pnpm ui:build || true

      - name: 准备发布产物
        env:
          OPENCLAW_TARGET: openclaw
        run: |
          node scripts/prepare-npm-publish.js
          cp README.md openclaw/README.md
          if [ -d openclaw/dist ]; then
            find openclaw/dist -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -print0 | \
              xargs -0 sed -i -E 's#(from |import |import\(|require\()"openclaw(["/])#\1"@agentai2026/openclaw-zh\2#g' || true
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: openclaw-build-nightly
          path: openclaw/
          retention-days: 2

  publish:
    needs: [check-upstream, build]
    if: needs.check-upstream.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT || github.token }}

      - uses: actions/download-artifact@v5
        with:
          name: openclaw-build-nightly
          path: openclaw

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: 检查 npm 登录身份
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::未配置 NPM_TOKEN"
            exit 1
          fi
          echo "[npm] whoami: $(npm whoami --registry=https://registry.npmjs.org/)"

      - name: 发布 npm
        working-directory: openclaw
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::未配置 NPM_TOKEN Secret"
            exit 1
          fi
          VER=$(node -p "require('./package.json').version")
          echo "[npm] 发布 ${{ env.NPM_PACKAGE }}@${VER}"
          if npm view "${{ env.NPM_PACKAGE }}@${VER}" version 2>/dev/null; then
            echo "[npm] 版本已存在，跳过"
            exit 0
          fi
          npm publish --access public --ignore-scripts --tag nightly 2>&1 | tee /tmp/npm.log
          CODE=${PIPESTATUS[0]}
          if [ "$CODE" -eq 0 ]; then exit 0; fi
          if grep -qiE "EPUBLISHCONFLICT|already exists" /tmp/npm.log; then exit 0; fi
          if grep -qiE "bypass 2fa|Two-factor authentication" /tmp/npm.log; then
            echo "::error::NPM_TOKEN 无效：请使用 npm Classic「Automation」令牌，或 Granular 令牌并开启 Bypass 2FA。见 SETUP_GUIDE.md"
          fi
          exit "$CODE"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: agentai2027
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.publish
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:nightly
            ${{ env.DOCKER_IMAGE }}:latest

      - name: 更新 last-build
        run: |
          node -e "
          require('fs').writeFileSync('.github/last-build.json', JSON.stringify({
            upstream_version: '${{ needs.check-upstream.outputs.upstream_version }}',
            upstream_sha: '${{ needs.check-upstream.outputs.upstream_sha }}',
            built_version: require('./openclaw/package.json').version,
            built_at: new Date().toISOString()
          }, null, 2));
          "
          git config user.name "openclaw-zh-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/last-build.json
          git diff --staged --quiet || git commit -m "ci: last-build ${{ needs.check-upstream.outputs.upstream_sha }}"
          git push || true
