# 每小时检查官方 openclaw 最新版，有更新则汉化构建并发布 npm + Docker
name: 定时检查最新版

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      force_build:
        description: '强制构建（跳过上游变更检测）'
        required: false
        default: false
        type: boolean

concurrency:
  group: openclaw-zh-release
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NPM_PACKAGE: '@agentai2027/openclaw-zh'
  DOCKER_IMAGE: agentai2027/openclaw-zh
  UPSTREAM_REPO: openclaw/openclaw
  NODE_VERSION: '22'
  # npm 整包 unpublish 后通常需 24h 才能同名再发
  NPM_COOLDOWN_MS: 86400000

permissions:
  contents: write

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    outputs:
      need_build: ${{ steps.check.outputs.need_build }}
      need_publish: ${{ steps.check.outputs.need_publish }}
      wait_cooldown: ${{ steps.check.outputs.wait_cooldown }}
      upstream_version: ${{ steps.check.outputs.upstream_version }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      in_npm_cooldown: ${{ steps.check.outputs.in_npm_cooldown }}
      npm_retry_after: ${{ steps.check.outputs.npm_retry_after }}
    steps:
      - uses: actions/checkout@v5

      - name: 检查 UTF-8 BOM
        run: node scripts/check-no-bom.mjs

      - name: 检测上游 / 待发布 / npm 冷却
        id: check
        env:
          FORCE: ${{ github.event.inputs.force_build }}
        run: node scripts/ci-check-release.mjs

  wait-cooldown:
    needs: check-upstream
    if: needs.check-upstream.outputs.wait_cooldown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT || github.token }}

      - name: npm 删包冷却中（下小时再试）
        run: |
          echo "::notice::npm 包处于删包冷却期，预计 ${{ needs.check-upstream.outputs.npm_retry_after }} 后可发布"
          echo "本次跳过构建以节省 Actions 时间；定时任务每小时自动检查"

      - name: 记录待发布（npm 冷却中，下小时重试）
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
          NPM_RETRY_AFTER: ${{ needs.check-upstream.outputs.npm_retry_after }}
        run: |
          node -e "
          const fs=require('fs');
          const p='.github/publish-pending.json';
          let j={};
          if (fs.existsSync(p)) j=JSON.parse(fs.readFileSync(p,'utf8'));
          Object.assign(j,{
            status:'pending',
            reason:'npm_unpublished_cooldown',
            upstream_version:process.env.UPSTREAM_VERSION,
            upstream_sha:process.env.UPSTREAM_SHA,
            retry_after:process.env.NPM_RETRY_AFTER,
            last_attempt_at:new Date().toISOString()
          });
          fs.writeFileSync(p, JSON.stringify(j,null,2)+'\n');
          "

      - name: 提交 pending 状态
        run: node scripts/ci-commit-release-state.mjs

  build:
    needs: check-upstream
    if: needs.check-upstream.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: 克隆上游并应用汉化
        env:
          OPENCLAW_TARGET: openclaw
          OVERLAY_ROOT: ${{ github.workspace }}
        run: |
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git openclaw
          node scripts/apply-package-zh.js
          node scripts/apply-i18n.js
          OPENCLAW_TARGET=openclaw UPSTREAM_VERSION=${{ needs.check-upstream.outputs.upstream_version }} \
            node scripts/bump-openclaw-version.js

      - name: 安装依赖并构建
        working-directory: openclaw
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: |
          set -e
          corepack enable
          pnpm install --no-frozen-lockfile --reporter=append-only
          cd ..
          OPENCLAW_TARGET=openclaw node scripts/regenerate-schema-artifacts.mjs
          cd openclaw
          pnpm canvas:a2ui:bundle || true
          node scripts/tsdown-build.mjs
          node scripts/runtime-postbuild.mjs
          node scripts/build-stamp.mjs || true
          pnpm build:plugin-sdk:dts || echo "⚠️ plugin-sdk dts 跳过"
          node --import tsx scripts/write-plugin-sdk-entry-dts.ts || true
          node --import tsx scripts/canvas-a2ui-copy.ts || true
          node --import tsx scripts/copy-hook-metadata.ts || true
          node --import tsx scripts/copy-export-html-templates.ts || true
          node --import tsx scripts/write-build-info.ts || true
          node --import tsx scripts/write-cli-startup-metadata.ts || true
          node --import tsx scripts/write-cli-compat.ts || true
          pnpm ui:build || true

      - name: 准备发布产物
        env:
          OPENCLAW_TARGET: openclaw
        run: |
          node scripts/prepare-npm-publish.js
          cp README.md openclaw/README.md
          if [ -d openclaw/dist ]; then
            find openclaw/dist -type f \( -name '*.js' -o -name '*.mjs' -o -name '*.cjs' \) -print0 | \
              xargs -0 sed -i -E 's#(from |import |import\(|require\()"openclaw(["/])#\1"@agentai2027/openclaw-zh\2#g' || true
          fi

      - uses: actions/upload-artifact@v5
        with:
          name: openclaw-build-nightly
          path: openclaw/
          retention-days: 7

  publish:
    needs: [check-upstream, build]
    if: needs.check-upstream.outputs.need_publish == 'true' && needs.check-upstream.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    outputs:
      npm_published: ${{ steps.npm.outputs.npm_published }}
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT || github.token }}

      - uses: actions/download-artifact@v5
        with:
          name: openclaw-build-nightly
          path: openclaw

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: 检查 npm 登录身份
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::未配置 NPM_TOKEN"
            exit 1
          fi
          echo "[npm] whoami: $(npm whoami --registry=https://registry.npmjs.org/)"

      - name: 发布 npm（含删包冷却预检）
        id: npm
        working-directory: ${{ github.workspace }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          OPENCLAW_DIR: ${{ github.workspace }}/openclaw
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
        run: node scripts/ci-npm-publish.mjs

      - uses: docker/setup-buildx-action@v3
        if: steps.npm.outputs.npm_published == 'true'

      - uses: docker/login-action@v3
        if: steps.npm.outputs.npm_published == 'true'
        with:
          username: agentai2027
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        if: steps.npm.outputs.npm_published == 'true'
        with:
          context: .
          file: docker/Dockerfile.publish
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:nightly
            ${{ env.DOCKER_IMAGE }}:latest

      - name: 更新发布状态（成功写 last-build；失败写 pending 供下小时重试）
        if: always()
        env:
          UPSTREAM_VERSION: ${{ needs.check-upstream.outputs.upstream_version }}
          UPSTREAM_SHA: ${{ needs.check-upstream.outputs.upstream_sha }}
        run: |
          if [ "${{ steps.npm.outputs.npm_published }}" = "true" ]; then
            export BUILT_VERSION=$(node -p "require('./openclaw/package.json').version")
          fi
          node scripts/ci-commit-release-state.mjs
