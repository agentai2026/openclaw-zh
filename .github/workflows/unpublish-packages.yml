# 手动删除已发布的 npm 包版本 + Docker 镜像标签（不可恢复，慎用）
name: 删除已发布包

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '必须输入大写 DELETE 后点 Run'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unpublish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: 确认操作
        run: |
          C="${{ github.event.inputs.confirm }}"
          C="$(echo "$C" | tr -d '[:space:]')"
          if [ "$C" != "DELETE" ]; then
            echo "::error::未确认。请点右侧 Run workflow，在 confirm 框输入 DELETE（全大写）"
            exit 1
          fi
          echo "已确认删除"

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: 删除 npm 全部版本
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node scripts/unpublish-npm-all.js

      - name: 删除 Docker 全部标签
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_USER: agentai2027
        run: bash scripts/delete-docker-tags.sh

      - name: 完成
        if: always()
        run: |
          echo "npm 与 Docker 删除步骤已执行"
          echo "若 npm 仍有版本: 到 https://www.npmjs.com/package/@agentai2027/openclaw-zh → Package settings → Delete package"
          npm view @agentai2027/openclaw-zh version 2>/dev/null || echo "npm: 包已不存在 (404) ✓"
