# 仅删除失败 / 取消 / 跳过的 Actions 记录
name: 删除失败记录

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检查 PAT
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "::error::请配置 Secret「PAT」（Classic：repo + workflow）"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: 验证 PAT 权限
        env:
          PAT: ${{ secrets.PAT }}
        run: node scripts/verify-pat.js

      - name: 删除失败记录
        env:
          PAT: ${{ secrets.PAT }}
        run: node scripts/delete-failed-runs.js
