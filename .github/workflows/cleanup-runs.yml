# 手动删除本仓库全部 Actions 运行记录
# 注意：必须使用仓库 Secret「PAT」，GITHUB_TOKEN 会 403 无法删除
name: 清理全部 Actions 记录

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: 检查 PAT 已配置
        run: |
          if [ -z "${{ secrets.PAT }}" ]; then
            echo "::error::未配置 Secret「PAT」。删除 Actions 记录必须用个人访问令牌，不能用默认 GITHUB_TOKEN。"
            echo "请到 Settings → Secrets and variables → Actions → 新建 PAT（Classic：勾选 repo + workflow）"
            exit 1
          fi
          echo "PAT 已配置，开始清理（请勿手动 Cancel，约需 5～15 分钟）"

      - name: 检出
        uses: actions/checkout@v4

      - name: 删除全部运行记录
        env:
          PAT: ${{ secrets.PAT }}
        run: node scripts/delete-all-runs.js
