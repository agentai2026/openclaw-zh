# 手动清理失败的 Actions 记录（一次性或偶尔使用）
name: 清理失败的工作流记录

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 删除 failure / cancelled / skipped 记录
        env:
          PAT: ${{ secrets.PAT }}
        run: node scripts/delete-failed-runs.js
