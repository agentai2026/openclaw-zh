# 手动删除本仓库全部 Actions 运行记录
name: 清理全部 Actions 记录

on:
  workflow_dispatch:

permissions:
  actions: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: 检出
        uses: actions/checkout@v4

      - name: 删除全部运行记录
        env:
          PAT: ${{ secrets.PAT || github.token }}
          GITHUB_TOKEN: ${{ secrets.PAT || github.token }}
        run: node scripts/delete-all-runs.js
